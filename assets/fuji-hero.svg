<svg viewBox="0 0 900 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mount Fuji illustration with red sun and waves">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f4ec"/>
      <stop offset="1" stop-color="#e7edf4"/>
    </linearGradient>
    <linearGradient id="fuji" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a4d6b"/>
      <stop offset="1" stop-color="#2b3a52"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="900" height="675" fill="url(#sky)"/>

  <!-- sun -->
  <circle cx="655" cy="168" r="92" fill="#c33d2e"/>
  <circle cx="655" cy="168" r="116" fill="none" stroke="#b98a2f" stroke-width="2" opacity=".45"/>

  <!-- birds -->
  <g stroke="#2b3a52" stroke-width="3" fill="none" stroke-linecap="round" opacity=".7">
    <path d="M170 150 q 12 -12 24 0 M194 150 q 12 -12 24 0"/>
    <path d="M255 195 q 10 -10 20 0 M275 195 q 10 -10 20 0"/>
  </g>

  <!-- stylized clouds -->
  <g fill="#fbfaf7" stroke="#d9d2c4" stroke-width="2">
    <rect x="60" y="238" width="240" height="26" rx="13"/>
    <rect x="120" y="268" width="150" height="26" rx="13"/>
    <rect x="560" y="288" width="270" height="26" rx="13"/>
    <rect x="640" y="318" width="160" height="26" rx="13"/>
  </g>

  <!-- distant hills -->
  <path d="M-20 505 Q 120 430 260 505 L 260 560 L -20 560 Z" fill="#93a8c2" opacity=".55"/>
  <path d="M600 510 Q 740 440 900 508 L 900 560 L 600 560 Z" fill="#93a8c2" opacity=".55"/>

  <!-- Mount Fuji -->
  <path d="M60 545 C 230 528 330 430 385 295 C 407 242 425 205 450 200 C 475 205 493 242 515 295 C 570 430 670 528 840 545 Z" fill="url(#fuji)"/>
  <!-- ridge lines -->
  <path d="M450 205 L 435 545 M450 205 L 505 540" stroke="#22304a" stroke-width="3" fill="none" opacity=".35"/>
  <!-- snow cap -->
  <path d="M385 295 C 407 242 425 205 450 200 C 475 205 493 242 515 295 L 501 288 L 486 312 L 469 288 L 452 312 L 435 288 L 418 312 L 401 288 Z" fill="#fbfaf7"/>

  <!-- sakura petals -->
  <g fill="#e8a7b3">
    <ellipse cx="120" cy="90" rx="9" ry="4.5" transform="rotate(-25 120 90)"/>
    <ellipse cx="200" cy="60" rx="8" ry="4" transform="rotate(15 200 60)"/>
    <ellipse cx="90" cy="180" rx="8" ry="4" transform="rotate(40 90 180)"/>
    <ellipse cx="300" cy="110" rx="7" ry="3.5" transform="rotate(-40 300 110)"/>
    <ellipse cx="250" cy="330" rx="8" ry="4" transform="rotate(20 250 330)"/>
    <ellipse cx="820" cy="90" rx="8" ry="4" transform="rotate(30 820 90)"/>
    <ellipse cx="770 " cy="230" rx="7" ry="3.5" transform="rotate(-20 770 230)"/>
  </g>

  <!-- waves -->
  <path d="M-50 560 q 45 -38 90 0 t 90 0 t 90 0 t 90 0 t 90 0 t 90 0 t 90 0 t 90 0 t 90 0 t 90 0 t 90 0 L 940 700 L -50 700 Z" fill="#a9bdd4"/>
  <path d="M-90 598 q 45 -38 90 0 t 90 0 t 90 0 t 90 0 t 90 0 t 90 0 t 90 0 t 90 0 t 90 0 t 90 0 t 90 0 t 90 0 L 940 700 L -90 700 Z" fill="#7d97b6"/>
  <path d="M-50 636 q 45 -38 90 0 t 90 0 t 90 0 t 90 0 t 90 0 t 90 0 t 90 0 t 90 0 t 90 0 t 90 0 t 90 0 L 940 700 L -50 700 Z" fill="#55708f"/>
</svg>
