  <path d="M-110 330 q 50 -40 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 L 1460 420 L -110 420 Z" fill="#46597a"/>
  <path d="M-60 358 q 50 -40 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 t 100 0 L 1460 420 L -60 420 Z" fill="#5d7396"/>
