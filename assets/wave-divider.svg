<svg viewBox="0 0 1400 380" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Night illustration of Mount Fuji over stylized waves">
  <defs>
    <linearGradient id="nsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2430"/>
      <stop offset="1" stop-color="#2a3850"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="380" fill="url(#nsky)"/>

  <!-- stars -->
  <g fill="#fbfaf7">
    <circle cx="140" cy="60" r="2.2" opacity=".8"/>
    <circle cx="310" cy="110" r="1.6" opacity=".55"/>
    <circle cx="520" cy="50" r="1.8" opacity=".65"/>
    <circle cx="700" cy="95" r="1.5" opacity=".5"/>
    <circle cx="905" cy="45" r="2" opacity=".7"/>
    <circle cx="1250" cy="70" r="1.7" opacity=".6"/>
    <circle cx="1340" cy="150" r="1.5" opacity=".5"/>
    <circle cx="80" cy="160" r="1.5" opacity=".5"/>
  </g>

  <!-- sun / moon -->
